<html>
<head>
<meta charset="UTF-8">
<title>Man</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

#image {
    display: block;
    height: 100vh;
    width: auto;
    margin: 0 auto;
}
</style>
</head>
<body>

<img id="image" src="preclick.webp" alt="">

<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<audio id="effect">
    <source src="interact.mp3" type="audio/mpeg">
</audio>

<script>
const image = document.getElementById("image");
const music = document.getElementById("music");
const effect = document.getElementById("effect");

let activated = false;

image.addEventListener("click", () => {

    if (activated) return;
    activated = true;

    image.src = "postclick.webp";

    effect.play();
    music.play();

});
</script>

</body>
</html>
